version: "3.9"

services:
  basquenland-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basquenland-web
    environment:
      LEADERBOARD_FILE: /var/lib/basquenland/leaderboard.csv
    command: >
      /bin/sh -c "mkdir -p /var/lib/basquenland
      && chown -R www-data:www-data /var/lib/basquenland
      && chmod -R 775 /var/lib/basquenland
      && apache2-foreground"
    ports:
      - "8085:80"
    volumes:
      - leaderboard_data:/var/lib/basquenland
    restart: unless-stopped

volumes:
  leaderboard_data:
